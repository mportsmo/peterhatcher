<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sketch Instrument v1.0</title>
    <style>
        body { background: #222; color: white; font-family: sans-serif; text-align: center; }
        .piano { display: flex; justify-content: center; margin-top: 50px; gap: 5px; }
        .key { 
            width: 80px; height: 300px; border-radius: 0 0 10px 10px;
            display: flex; flex-direction: column; justify-content: flex-end;
            padding-bottom: 20px; cursor: pointer; transition: transform 0.1s;
            color: #333; font-weight: bold; border: 1px solid rgba(0,0,0,0.2);
        }
        .key:active { transform: scale(0.95); filter: brightness(1.2); }
        .label { font-size: 14px; margin-bottom: 5px; }
        .hz { font-size: 12px; opacity: 0.7; }
    </style>
</head>
<body>
    <h1>Digital Sketch Instrument</h1>
    <p>Click the keys or use your computer keyboard (A, S, D, F, G, H, J)</p>
    
    <div class="piano" id="keyboard">
        </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        const config = [
            { note: 'C5', hz: 523, color: '#f5d1d1', len: '6-7/16"', key: 'A' },
            { note: 'D5', hz: 587, color: '#f5e4d1', len: '5-3/4"',   key: 'S' },
            { note: 'E5', hz: 659, color: '#f5f5d1', len: '5-1/8"',   key: 'D' },
            { note: 'F5', hz: 698, color: '#d1f5d1', len: '4-13/16"', key: 'F' },
            { note: 'G5', hz: 784, color: '#d1e4f5', len: '4-5/16"',  key: 'G' },
            { note: 'A5', hz: 880, color: '#d1d1f5', len: '3-13/16"', key: 'H' },
            { note: 'B5', hz: 988, color: '#e4d1f5', len: '3-7/16"',  key: 'J' }
        ];

        const keyboard = document.getElementById('keyboard');

        config.forEach(data => {
            const el = document.createElement('div');
            el.className = 'key';
            el.style.backgroundColor = data.color;
            el.innerHTML = `<div class="label">${data.note}</div><div class="hz">${data.hz}Hz</div>`;
            el.onmousedown = () => play(data.hz, data.len);
            keyboard.appendChild(el);
            data.element = el;
        });

        function play(freq, measure) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            // Physical modeling: Shorter "measurements" create sharper attacks
            const decay = parseFloat(measure.split('-')[0]) / 10; 
            
            osc.type = 'triangle'; // Richer than sine, fits the "physical" sketch
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + decay);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + decay);
        }

        window.addEventListener('keydown', (e) => {
            const match = config.find(d => d.key === e.key.toUpperCase());
            if (match) play(match.hz, match.len);
        });
    </script>
</body>
</html>
